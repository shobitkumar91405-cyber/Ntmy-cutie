<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ A Special Message For You ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; } [cite: 2]

        :root {
            --primary-pink: #ff69b4;
            --soft-pink: #ffb6c1; [cite: 4]
            --deep-pink: #ff1493;
            --glow-pink: #ff69b4;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #fff 0%, #ffebee 25%, #fff0f5 50%, #fdf2f8 75%, #fff 100%); [cite: 5]
            --glow-shadow: 0 0 20px var(--glow-pink), 0 0 40px var(--glow-pink); [cite: 6]
        }

        body {
            font-family: 'Poppins', sans-serif; [cite: 7]
            background: var(--gradient); [cite: 8]
            min-height: 100vh;
            overflow: hidden;
            cursor: none; [cite: 9]
            position: relative;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 15px; height: 15px; [cite: 10]
            background: var(--deep-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: var(--glow-shadow);
            transition: transform 0.1s ease;
        }

        .cursor.follower {
            width: 35px; height: 35px; [cite: 12]
            background: rgba(255, 105, 180, 0.3);
            opacity: 0.5;
        }

        /* Particles */
        .particles-container {
            position: fixed; top: 0; left: 0; [cite: 13]
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .particle {
            position: absolute;
            animation: float linear infinite; [cite: 15]
            filter: drop-shadow(0 0 5px var(--glow-pink));
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg) scale(0); opacity: 0; } [cite: 20]
            10% { opacity: 1; transform: scale(1); } [cite: 21]
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(0.5); opacity: 0; } [cite: 23]
        }

        /* UI Elements */
        .header {
            position: fixed; top: 20px; left: 50%; [cite: 33]
            transform: translateX(-50%);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 105, 180, 0.3); [cite: 34]
        }

        .music-player {
            position: fixed; bottom: 30px; right: 30px; [cite: 35]
            z-index: 1000; width: 60px; height: 60px;
            border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center; [cite: 37]
            cursor: pointer; box-shadow: var(--glow-shadow);
            transition: 0.3s;
        }

        .music-player:hover { transform: scale(1.1); } [cite: 38]

        /* Page System */
        .page-container {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; [cite: 46]
            position: absolute; top: 0; left: 0; width: 100%;
            opacity: 0; visibility: hidden; [cite: 47]
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .page-container.active {
            opacity: 1; visibility: visible; [cite: 49]
            transform: translateY(0);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.95); [cite: 51]
            padding: 40px; border-radius: 25px;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2); [cite: 52]
            width: 90%; max-width: 550px; text-align: center;
        }

        .glow-text {
            background: linear-gradient(45deg, var(--deep-pink), var(--primary-pink)); [cite: 26]
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .typing-container {
            font-family: 'Dancing Script', cursive;
            font-size: 28px; min-height: 60px; margin: 20px 0; [cite: 59]
        }

        .ultra-btn {
            background: linear-gradient(45deg, var(--deep-pink), var(--primary-pink)); [cite: 64]
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; cursor: pointer; [cite: 64]
            font-size: 18px; font-weight: 600;
            transition: 0.3s; margin-top: 20px;
        }

        .ultra-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 105, 180, 0.4); } [cite: 70]

        /* Love Meter */
        .love-meter-container {
            width: 250px; height: 250px; margin: 20px auto; position: relative; [cite: 73]
        }

        .love-meter {
            width: 100%; height: 100%; border-radius: 50%; [cite: 74]
            background: conic-gradient(var(--soft-pink) 0deg, #eee 0deg);
            transition: 0.1s;
        }

        .meter-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); [cite: 77]
            width: 80%; height: 80%; background: white; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; [cite: 78]
        }

        .no-btn { background: #ccc !important; } [cite: 173]

        .celebration {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; [cite: 94]
            pointer-events: none; z-index: 10000; opacity: 0;
        }

        .confetti {
            position: absolute; width: 8px; height: 8px; [cite: 96]
            animation: fall 3s infinite linear;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } [cite: 99]
        }
    </style>
</head>
<body>

    <div class="cursor follower" id="cursorFollower"></div>
    <div class="cursor" id="cursor"></div>
    <div class="particles-container" id="particles"></div>

    <div class="header">
        <a href="https://instagram.com/smss1708" target="_blank" style="color: #ff1493; text-decoration: none; font-family: 'Dancing Script'; font-size: 20px;">
            Made with ✨ by Sivasingh
        </a>
    </div>

    <div class="music-player" id="musicToggle">
        <span id="musicIcon">🎵</span>
        <audio id="bgMusic" loop>
            <source src="tere-liye.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="page-container active" data-page="0">
        <div class="content-card">
            <div style="font-size: 3rem;">✨</div>
            <div class="typing-container glow-text" data-text="Hii, Suno na..." id="typing0"></div>
            <button class="ultra-btn" onclick="nextPage()">Aage Suno ✨</button> [cite: 107]
        </div>
    </div>

    <div class="page-container" data-page="1">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Pata nahi tum kaise react karogi..." id="typing1"></div>
            <button class="ultra-btn" onclick="nextPage()">Bolo na... ➡️</button>
        </div>
    </div>

    <div class="page-container" data-page="2">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Par tumhare saath waqt bitana achha lagta hai." id="typing2"></div>
            <button class="ultra-btn" onclick="nextPage()">Achha? ✨</button>
        </div>
    </div>

    <div class="page-container" data-page="3">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Tumhari dosti mere liye bahut special hai..." id="typing3"></div>
            <button class="ultra-btn" onclick="nextPage()">Hmm... 💖</button> [cite: 109]
        </div>
    </div>

    <div class="page-container" data-page="4">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Dosti se thoda zyada feel hota hai ab..." id="typing4"></div>
            <button class="ultra-btn" onclick="nextPage()">Matlab? 😊</button>
        </div>
    </div>

    <div class="page-container" data-page="5">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Mujhe tum bahut pasand ho... ek dost se badhkar." id="typing5"></div>
            <button class="ultra-btn" onclick="nextPage()">Sach mein? 🌸</button> [cite: 112]
        </div>
    </div>

    <div class="page-container" data-page="6">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Kya hum ek nayi shuruat kar sakte hain?" id="typing6"></div>
            <button class="ultra-btn" onclick="nextPage()">Kaise? ✨</button>
        </div>
    </div>

    <div class="page-container" data-page="7">
        <div class="content-card">
            <div class="typing-container glow-text" data-text="Bas ek baar ye shayari suno mere liye..." id="typing7"></div>
            <button class="ultra-btn" onclick="nextPage()">Sunao... 💞</button>
        </div>
    </div>

    <div class="page-container" data-page="8">
        <div class="content-card">
            <h3 class="glow-text" style="margin-bottom:15px;">Dil ki Baat ✨</h3>
            <div id="shayari" class="typing-container" style="font-size: 18px; text-align: left; min-height: 200px;"></div>
            <button class="ultra-btn" onclick="nextPage()">Beautiful! 💝</button> [cite: 115]
        </div>
    </div>

    <div class="page-container" data-page="9">
        <div class="content-card">
            <div class="glow-text" id="calcText">Checking our Connection...</div>
            <div class="love-meter-container">
                <div class="love-meter" id="loveMeter">
                    <div class="meter-center">
                        <div id="meterText" class="glow-text" style="font-size: 24px;">0%</div>
                    </div>
                </div>
            </div>
            <button class="ultra-btn" id="loveContinue" onclick="nextPage()" style="display:none;">Perfect! ✨</button> [cite: 118]
        </div>
    </div>

    <div class="page-container" data-page="10">
        <div class="content-card">
            <h2 class="glow-text" style="font-size: 32px; font-family: 'Dancing Script';">Will you walk by my side, forever? 💖</h2>
            <div style="margin-top: 30px;">
                <button class="ultra-btn" onclick="celebrateLove()">Yes, I'd Love To! ❤️</button> [cite: 120]
                <button class="ultra-btn no-btn" id="noBtn" onmouseover="runAway()">No... 😢</button> [cite: 173]
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        class LoveStory {
            constructor() {
                this.currentPage = 0;
                this.totalPages = 10; [cite: 122]
                this.isTyping = false;
                this.musicPlaying = false;
                this.init();
            }

            init() {
                this.setupCursor();
                this.createParticles();
                this.setupMusic();
                this.handlePageContent(); [cite: 162]
            }

            setupCursor() {
                const cursor = document.getElementById('cursor');
                const follower = document.getElementById('cursorFollower');
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                    follower.style.left = e.clientX + 'px';
                    follower.style.top = e.clientY + 'px';
                });
            }

            createParticles() {
                const container = document.getElementById('particles');
                const icons = ['💖', '✨', '🌸', '💕']; [cite: 125]
                setInterval(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.fontSize = Math.random() * 20 + 10 + 'px';
                    p.style.animationDuration = Math.random() * 3 + 4 + 's';
                    container.appendChild(p);
                    setTimeout(() => p.remove(), 6000); [cite: 129]
                }, 300);
            }

            setupMusic() {
                const music = document.getElementById('bgMusic');
                const toggle = document.getElementById('musicToggle');
                toggle.addEventListener('click', () => {
                    if(this.musicPlaying) {
                        music.pause();
                        document.getElementById('musicIcon').textContent = '🔇'; [cite: 138]
                    } else {
                        music.play().catch(() => {});
                        document.getElementById('musicIcon').textContent = '🎵'; [cite: 139]
                    }
                    this.musicPlaying = !this.musicPlaying;
                });
            }

            async typeWriter(element, text) {
                if(!element) return;
                this.isTyping = true;
                element.innerHTML = '';
                for(let char of text) {
                    element.innerHTML += char;
                    await new Promise(r => setTimeout(r, 60)); [cite: 144]
                }
                this.isTyping = false;
            }

            async nextPage() {
                if(this.isTyping) return; [cite: 160]
                const current = document.querySelector(`[data-page="${this.currentPage}"]`);
                this.currentPage++;
                const next = document.querySelector(`[data-page="${this.currentPage}"]`);
                
                if(next) {
                    current.classList.remove('active');
                    setTimeout(() => {
                        next.classList.add('active');
                        this.handlePageContent();
                    }, 400);
                }
            }

            async handlePageContent() {
                const page = this.currentPage;
                if(page < 8) {
                    const el = document.getElementById(`typing${page}`);
                    await this.typeWriter(el, el.parentElement.dataset.text); [cite: 163]
                } else if(page === 8) {
                    await this.showShayari(); [cite: 164]
                } else if(page === 9) {
                    this.loveMeter(); [cite: 165]
                }
            }

            async showShayari() {
                const lines = [
                    "Tum bologi dhimi awaaz me 🌹",
                    "Fir bhi baat pakad lunga 💕",
                    "Gale nahi lagaunga tumko 💖",
                    "Bas haath pakad lunga ✨",
                    "",
                    "Hotel me nahi jana mujhko 🏨",
                    "Sadak pe saath chalna hai 🚶‍♂️💃",
                    "Thodi si meri ho sakti ho kya? 💯💖"
                ]; [cite: 147, 149, 151]
                const box = document.getElementById('shayari');
                for(let line of lines) {
                    box.innerHTML += line + "<br>";
                    await new Promise(r => setTimeout(r, 1200)); [cite: 152]
                }
            }

            loveMeter() {
                let count = 0;
                const meter = document.getElementById('loveMeter');
                const text = document.getElementById('meterText');
                const interval = setInterval(() => {
                    count++;
                    meter.style.background = `conic-gradient(#ff69b4 ${count * 3.6}deg, #eee 0deg)`; [cite: 155]
                    text.innerText = count + "%";
                    if(count >= 100) {
                        clearInterval(interval);
                        document.getElementById('loveContinue').style.display = 'inline-block'; [cite: 159]
                    }
                }, 40);
            }

            runAway() {
                const btn = document.getElementById('noBtn');
                btn.style.position = 'absolute';
                btn.style.top = Math.random() * 80 + '%';
                btn.style.left = Math.random() * 80 + '%'; [cite: 173]
            }

            celebrateLove() {
                const cel = document.getElementById('celebration');
                cel.style.opacity = '1';
                for(let i=0; i<100; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
                    c.style.animationDelay = Math.random() * 2 + 's';
                    cel.appendChild(c);
                } [cite: 180, 182]
                setTimeout(() => alert("I'm so happy! Thank you for being in my life! ❤️✨"), 1000); [cite: 178]
            }
        }

        const app = new LoveStory();
    </script>
</body>
</html>
