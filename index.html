<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Lori for Suruchi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      color: #fff;
      position: relative;
      text-align: center;
    }

    /* Rain animation */
    .rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .drop {
      position: absolute;
      width: 2px;
      height: 50px;
      background: rgba(255, 255, 255, 0.3);
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 2;
    }

    .page.active {
      opacity: 1;
    }

    h1 {
      font-size: 1.8rem;
      line-height: 1.3;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid #fff;
      color: #fff;
      padding: 12px 30px;
      font-size: 1.1rem;
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .btn:hover, .btn:active {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    /* Video hearts */
    .videos-container {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 400px;
      gap: 20px;
    }

    .heart-card {
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    .heart-card:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.2);
    }

    .heart-card::before,
    .heart-card::after {
      content: '';
      width: 70px;
      height: 110px;
      position: absolute;
      left: 70px;
      transform: rotate(-45deg);
      background: rgba(255, 182, 193, 0.6);
      border-radius: 50px 50px 0 0;
      z-index: -1;
    }

    .heart-card::after {
      transform: rotate(45deg);
      left: 0;
    }

    video {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      display: none;
    }

    .label {
      position: absolute;
      bottom: -25px;
      font-size: 0.8rem;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="rain" id="rain"></div>

  <div id="page1" class="page active">
    <h1>hi suruchi 😊<br>aapko neend nahi aa rahi,<br>koi na... aap lori suno 🥰</h1>
    <button class="btn" onclick="nextPage()">next</button>
  </div>

  <div id="page2" class="page">
    <h1>tap on a heart to listen lori</h1>
    <div class="videos-container">
      <div class="heart-card" onclick="playVideo(1)">
        <video id="vid1" src="video1.mp4" preload="none" muted loop></video>
        <div class="label">lori 1</div>
      </div>
      <div class="heart-card" onclick="playVideo(2)">
        <video id="vid2" src="video2.mp4" preload="none" muted loop></video>
        <div class="label">lori 2</div>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;

    function nextPage() {
      document.getElementById('page1').classList.remove('active');
      document.getElementById('page2').classList.add('active');
      currentPage = 2;
      createRain();
    }

    function playVideo(num) {
      const vid1 = document.getElementById('vid1');
      const vid2 = document.getElementById('vid2');
      const otherVid = num === 1 ? vid2 : vid1;
      const thisVid = num === 1 ? vid1 : vid2;

      // Pause other video
      otherVid.pause();
      otherVid.currentTime = 0;
      otherVid.style.display = 'none';

      // Play this video
      thisVid.style.display = 'block';
      thisVid.play().catch(() => {}); // Mobile fallback
    }

    function createRain() {
      const rain = document.getElementById('rain');
      for (let i = 0; i < 100; i++) {
        const drop = document.createElement('div');
        drop.className = 'drop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        rain.appendChild(drop);
      }
    }
  </script>
</body>
</html>
